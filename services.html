<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Каталог — Auto Detailing</title>
    <meta name="description" content="Каталог работ по детейлингу: мойка, интерьер, полировка, аксессуары." />
    <link rel="stylesheet" href="assets/css/style.css?v=20260303-2060" />
    <script defer src="assets/js/i18n.js?v=20260303-2045"></script>
    <script defer src="assets/js/api.js?v=20260303-2045"></script>
    <script defer src="assets/js/nav.js?v=20260303-2045"></script>
    <script defer src="assets/js/catalog.js?v=20260303-2045"></script>
  </head>
  <body class="theme">
    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="index.html">
          <span class="brand__mark">AE</span>
          <span class="brand__text">Auto Detailing</span>
        </a>
        <nav class="nav">
          <a data-i18n="nav_home" class="nav__link" href="index.html">Главная</a>
          <a data-i18n="nav_catalog" class="nav__link is-active" href="services.html">Каталог</a>
          <a data-i18n="nav_account" class="nav__link" href="account.html">Кабинет</a>
          <a data-i18n="nav_contacts" class="nav__link" href="contacts.html">Контакты</a>
        </nav>
        <div class="topbar__actions">
          <button class="btn btn--ghost" data-lang-switch="ru"><span class="flag flag--ru" aria-hidden="true"></span>RU</button>
          <button class="btn btn--ghost" data-lang-switch="en"><span class="flag flag--en" aria-hidden="true"></span>EN</button>
          <a class="btn btn--primary btn--cart" href="cart.html"><span data-i18n="nav_cart">Корзина</span><span id="cart-badge" class="top-cart-badge">0</span></a>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div class="section__head">
          <h1 data-i18n="catalog_title">Каталог</h1>
          <p data-i18n="catalog_subtitle">Выберите подходящий пакет или отдельную услугу.</p>
        </div>

        <div class="toolbar">
          <div class="filters">
            <button class="chip is-active" data-filter="all" data-i18n="filter_all">Все</button>
            <button class="chip" data-filter="wash" data-i18n="filter_wash">Мойка</button>
            <button class="chip" data-filter="exterior" data-i18n="filter_exterior">Экстерьер</button>
            <button class="chip" data-filter="interior" data-i18n="filter_interior">Интерьер</button>
            <button class="chip" data-filter="polish" data-i18n="filter_polish">Полировка</button>
            <button class="chip" data-filter="accessories" data-i18n="filter_accessories">Аксессуары</button>
          </div>

          <div class="sort">
            <label>
              <span data-i18n="sort_label">Сортировка</span>
              <select id="sort-select">
                <option value="name-asc" data-i18n="sort_name_asc">Название A-Z</option>
                <option value="name-desc" data-i18n="sort_name_desc">Название Z-A</option>
                <option value="price-asc" data-i18n="sort_price_asc">Цена по возрастанию</option>
                <option value="price-desc" data-i18n="sort_price_desc">Цена по убыванию</option>
              </select>
            </label>
          </div>
        </div>

        <div id="catalog-grid" class="grid grid--3"></div>
      </div>
    </main>

  </body>
</html>
